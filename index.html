<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Claude Code Skills 安装台</title>
    <meta name="description" content="聚合 Claude Code skills，批量选择并导出 ccswitch 可导入的 ZIP。" />
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <aside class="control-panel" aria-label="筛选和批量操作">
        <section class="brand-block">
          <div class="brand-mark" aria-hidden="true">CC</div>
          <div>
            <h1 data-i18n="brandTitle">Skills 安装台</h1>
            <p data-i18n="brandSubtitle">聚合大部分 Claude Code skills，批量打包成 ccswitch ZIP，一次导入。</p>
          </div>
        </section>

        <section class="language-box" aria-label="语言">
          <button id="lang-zh" class="soft-button is-active" type="button">中文</button>
          <button id="lang-en" class="soft-button" type="button">English</button>
        </section>

        <section class="stats" aria-label="数据统计">
          <div><b id="stat-total">0</b><span data-i18n="statTotal">全库</span></div>
          <div><b id="stat-selected">0</b><span data-i18n="statSelected">已选</span></div>
          <div><b id="stat-repos">4</b><span data-i18n="statRepos">仓库</span></div>
        </section>

        <section class="search-stack" aria-label="搜索筛选">
          <label class="field-label" for="search-input" data-i18n="searchLabel">搜索</label>
          <div class="search-box">
            <span aria-hidden="true">⌕</span>
            <input id="search-input" type="search" placeholder="名称、用途、场景、仓库..." autocomplete="off" data-i18n-placeholder="searchPlaceholder" />
          </div>

          <label class="field-label" for="repo-filter" data-i18n="repoLabel">仓库</label>
          <select id="repo-filter" aria-label="按仓库筛选">
            <option value="all" data-i18n="allRepos">全部仓库</option>
          </select>

          <label class="field-label" for="tag-filter" data-i18n="tagLabel">标签</label>
          <select id="tag-filter" aria-label="按标签筛选">
            <option value="all" data-i18n="allTags">全部标签</option>
          </select>

          <label class="field-label" for="sort-filter" data-i18n="sortLabel">排序</label>
          <select id="sort-filter" aria-label="排序方式">
            <option value="common" data-i18n="sortCommon">常用优先</option>
            <option value="selected" data-i18n="sortSelected">已选优先</option>
            <option value="name" data-i18n="sortName">名称 A-Z</option>
          </select>
        </section>

        <section class="selection-box" aria-label="选择操作">
          <div>
            <strong id="result-count">0 个结果</strong>
            <span id="selection-hint">先勾选，再导出 ccswitch ZIP 批量导入</span>
          </div>
          <button id="select-visible" class="soft-button" type="button">选中筛选结果</button>
          <button id="select-all" class="soft-button" type="button">全选全库</button>
          <button id="toggle-checked-only" class="soft-button" type="button" data-i18n="checkedOnly">只看已选</button>
          <button id="clear-selection" class="soft-button muted" type="button" data-i18n="clearSelection">清空选择</button>
        </section>

        <section class="export-box" aria-label="导出和安装">
          <button id="copy-selected" class="primary-button" type="button" data-i18n="copySelected">复制已选安装命令</button>
          <button id="copy-all-install" class="primary-button danger" type="button" data-i18n="copyAllInstall">复制全库安装命令</button>
          <button id="download-zip" class="primary-button dark" type="button" data-i18n="downloadZip">导出 ccswitch ZIP</button>
          <button id="open-submit" class="soft-button" type="button" data-i18n="submitSkill">提交 skill</button>
        </section>
      </aside>

      <section class="catalog-panel" aria-label="Skills 列表">
        <div id="skills-list" class="skills-list"></div>
      </section>

      <aside id="detail-panel" class="detail-panel" aria-live="polite">
        <div class="detail-empty">
          <h2 data-i18n="emptyTitle">选择一个 skill</h2>
          <p data-i18n="emptyBody">右侧固定显示当前 skill 的核心说明和操作按钮。</p>
        </div>
      </aside>
    </main>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
    <div id="submit-modal" class="modal-backdrop" hidden>
      <form id="submit-form" class="submit-modal">
        <header>
          <h2 data-i18n="submitTitle">提交候选 skill</h2>
          <button id="close-submit" class="soft-button" type="button" aria-label="关闭">×</button>
        </header>
        <label>
          <span data-i18n="submitRepo">GitHub 仓库</span>
          <input id="submit-repo" name="repo" type="url" placeholder="https://github.com/owner/repo" required />
        </label>
        <label>
          <span data-i18n="submitPath">Skill 路径（可选）</span>
          <input id="submit-path" name="skillPath" type="text" placeholder=".claude/skills/example" />
        </label>
        <label>
          <span data-i18n="submitDescription">这个 skill 能做什么</span>
          <textarea id="submit-description" name="description" maxlength="1200" required></textarea>
        </label>
        <label>
          <span data-i18n="submitWhy">为什么值得收录</span>
          <textarea id="submit-why" name="whyUseful" maxlength="1200"></textarea>
        </label>
        <label>
          <span data-i18n="submitProof">完成任务截图（可选）</span>
          <input id="submit-proof" name="proof" type="file" accept="image/png,image/jpeg,image/webp" />
        </label>
        <label>
          <span data-i18n="submitContact">联系方式（可选，不公开）</span>
          <input id="submit-contact" name="contact" type="text" maxlength="180" />
        </label>
        <label class="hp-field" aria-hidden="true">
          <span>Website</span>
          <input id="submit-website" name="website" type="text" tabindex="-1" autocomplete="off" />
        </label>
        <footer>
          <button class="primary-button" type="submit" data-i18n="submitSend">提交审核</button>
          <p data-i18n="submitNote">提交后只进入维护者审核队列，不会直接发布。</p>
        </footer>
      </form>
    </div>
    <script type="module" src="/src/app.js"></script>
  </body>
</html>
